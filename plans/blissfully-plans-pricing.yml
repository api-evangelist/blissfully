specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Blissfully
providerId: blissfully
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Procurement
  - SaaS Discovery
  - SaaS Management
  - Software Procurement
  - Spend Optimization
  - Vendor Management
description: Blissfully was acquired by Vendr; the SaaS-management product line now ships under Vendr
  branding and pricing. Vendr publishes a single Platform-Access subscription plus a credit-based
  negotiation engine (Advisory or Autonomous mode) where credit consumption scales with the dollar
  value of vendor deals being negotiated. A free exploration tier lets prospects browse benchmarks
  and upload contracts before committing.
sources:
  - https://www.vendr.com/pricing
notes: Original blissfully.com pricing page now redirects to vendr.com/pricing. Reconciled values
  are taken from the Vendr platform; legacy Blissfully tier names have been retired.
plans:
  - id: blissfully-free
    name: Free Exploration
    type: freemium
    description: No-cost access to browse Vendr's pricing benchmarks, upload contracts, and preview
      the negotiation workflow before purchasing the platform.
    entries:
      - label: Pricing benchmark browsing
        name: benchmark_access
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Contract upload
        name: contract_upload
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 2,500+ product pricing benchmarks
      - name: Contract intake / preview
      - name: Self-serve onboarding
  - id: blissfully-platform
    name: Vendr Platform Access
    type: subscription
    description: Annual subscription that unlocks the SaaS-management workspace plus 100 included
      negotiation credits. Add-on credits are purchased as needed depending on advisory vs. autonomous
      negotiation mode and total deal volume.
    entries:
      - label: Platform access (annual)
        name: platform_annual
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: $12,000 / year
        userMultiplied: false
      - label: Included negotiation credits
        name: included_credits
        type: quota
        metric: credit
        limit: 100
        timeFrame: year
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Negotiation - Advisory mode
        name: credits_advisory
        type: metered
        metric: credit
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: ~600 credits per $1M deal value
        userMultiplied: false
      - label: Negotiation - Autonomous mode
        name: credits_autonomous
        type: metered
        metric: credit
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: ~1000 credits per $1M deal value
        userMultiplied: false
      - label: Volume-discounted credit rate (>= $10M deals)
        name: credits_volume
        type: tiered
        metric: credit
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: scales from ~2.0% to ~1.2% of deal value
        userMultiplied: false
    elements:
      - name: SaaS discovery and inventory
      - name: Real-time pricing benchmarks
      - name: Contract repository
      - name: SSO and organization management
      - name: Negotiation credit ledger
      - name: Advisory and Autonomous negotiation modes
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
