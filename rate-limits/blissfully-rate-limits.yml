specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Blissfully
providerId: blissfully
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - SaaS Management
  - Procurement
description: Blissfully was acquired by Vendr; legacy Blissfully API rate limit documentation is no
  longer published. Vendr does not publish numeric API rate limits on its public marketing surface;
  consumers should refer to the customer help center after onboarding for the active throttling
  policy. This artifact is a placeholder pending verified provider documentation.
sources:
  - https://www.vendr.com/pricing
notes: Verify rate limits with Vendr customer support; original Blissfully developer portal has
  been retired.
responseCodes:
  throttled: 429
limits:
  - name: Vendr platform API
    scope: account
    metric: varies
    limit: see Vendr customer documentation
    notes: Public marketing site does not document REST rate limits; Vendr support provides the
      active throttling values to onboarded customers.
policies:
  - name: Backoff
    description: Clients receiving a 429 response should respect any Retry-After header and apply
      exponential backoff with jitter.
  - name: Customer support escalation
    description: Throttling concerns and quota raises are handled through the Vendr account team
      rather than self-service.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
