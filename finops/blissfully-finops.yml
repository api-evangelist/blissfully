specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Blissfully
providerId: blissfully
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - SaaS Management
  - Procurement
description: 'FOCUS-aligned FinOps for the Blissfully product line, now sold under Vendr: an annual
  Platform-Access subscription combined with usage-based negotiation credits whose burn rate scales
  with negotiated deal value.'
sources:
  - https://www.vendr.com/pricing
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Vendr, Inc.
serviceCategory: SaaS Management / Procurement
billingModel:
  pricingCategory: Subscription + Credit-Based Usage
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Vendr (formerly Blissfully)
  ServiceCategory: SaaS Management
  ProviderName: Vendr
  PublisherName: Vendr, Inc.
  InvoiceIssuerName: Vendr, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: platform_subscription
    unit: year
    aggregation: sum
    dimensions:
      - tier
  - name: negotiation_credits_consumed
    unit: credit
    aggregation: sum
    dimensions:
      - mode
      - vendor
      - deal_size_bucket
  - name: negotiated_deal_volume
    unit: USD
    aggregation: sum
    dimensions:
      - vendor
      - mode
  - name: contracts_under_management
    unit: contract
    aggregation: count
    dimensions:
      - vendor
      - department
principles:
  - name: Visibility
    description: Use the Vendr SaaS inventory and contract repository to see active subscriptions and
      renewal dates; export the credit ledger to track Advisory vs Autonomous burn.
  - name: Allocation
    description: Tag each contract with department / cost center on intake so renewal spend and
      negotiation savings can be attributed back to budget owners.
  - name: Optimization
    description: Use Advisory mode (~600 credits / $1M) for deals where internal procurement leads;
      reserve Autonomous mode (~1000 credits / $1M) for high-volume or low-internal-capacity deals;
      stack credit purchases at higher volume tiers (down to ~1.2%) for largest renewals.
  - name: Accountability
    description: Treat 17% average savings claim as the unit-economics floor; review credit
      consumption and realized savings each quarter against the platform-access subscription cost.
maintainers:
